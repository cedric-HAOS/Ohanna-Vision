name: Ohana Vision
environment: production
debug: false

server:
  host: 0.0.0.0
  port: 8000
  log_level: info

web:
  documentation_enabled: false

agent:
  administration_enabled: true
  administration_url: http://127.0.0.1:8765
  token_file: /etc/ohana-vision/management.token
  timeout_seconds: 5.0
